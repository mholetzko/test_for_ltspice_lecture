<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" font-family="Arial,sans-serif">
  <rect width="400" height="240" fill="white"/>

  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">Aufgabe 1 — Minimalschaltung: WAV-Import testen</text>

  <!-- ═══ GND under V1 (x=80) ═══ -->
  <line x1="80" y1="185" x2="80" y2="200" stroke="#333" stroke-width="1.8"/>
  <line x1="66" y1="200" x2="94" y2="200" stroke="#333" stroke-width="2.2"/>
  <line x1="71" y1="208" x2="89" y2="208" stroke="#333" stroke-width="2.2"/>
  <line x1="76" y1="216" x2="84" y2="216" stroke="#333" stroke-width="2.2"/>

  <!-- ═══ GND under R1 (x=210) ═══ -->
  <line x1="210" y1="185" x2="210" y2="200" stroke="#333" stroke-width="1.8"/>
  <line x1="196" y1="200" x2="224" y2="200" stroke="#333" stroke-width="2.2"/>
  <line x1="201" y1="208" x2="219" y2="208" stroke="#333" stroke-width="2.2"/>
  <line x1="206" y1="216" x2="214" y2="216" stroke="#333" stroke-width="2.2"/>

  <!-- ═══ V1 source ═══ -->
  <line x1="80" y1="100" x2="80" y2="115" stroke="#333" stroke-width="1.8"/>
  <circle cx="80" cy="140" r="25" fill="white" stroke="#333" stroke-width="1.8"/>
  <path d="M68,140 Q72,129 76,140 Q80,151 84,140 Q88,129 92,140" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="165" x2="80" y2="185" stroke="#333" stroke-width="1.8"/>

  <!-- V1 label -->
  <text x="48" y="134" text-anchor="end" font-size="11" font-weight="bold" fill="#222">V1</text>
  <text x="48" y="146" text-anchor="end" font-size="9" fill="#555">wavefile=</text>
  <text x="48" y="158" text-anchor="end" font-size="9" fill="#555">"input.wav"</text>

  <!-- ═══ Horizontal wire: V1 top → junction ═══ -->
  <line x1="80" y1="100" x2="210" y2="100" stroke="#333" stroke-width="1.8"/>

  <!-- V(in) net label above wire -->
  <text x="140" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1">V(in)</text>

  <!-- ═══ Junction dot ═══ -->
  <circle cx="210" cy="100" r="3.5" fill="#333"/>

  <!-- ═══ R1 resistor (vertical, x=210) ═══ -->
  <line x1="210" y1="100" x2="210" y2="118" stroke="#333" stroke-width="1.8"/>
  <rect x="196" y="118" width="28" height="50" fill="white" stroke="#333" stroke-width="1.8"/>
  <line x1="210" y1="168" x2="210" y2="185" stroke="#333" stroke-width="1.8"/>
  <text x="246" y="140" font-size="11" font-weight="bold" fill="#222">R1</text>
  <text x="246" y="153" font-size="10" fill="#666">10 kΩ</text>

  <!-- ═══ Wire: junction → V(out) terminal (right) ═══ -->
  <line x1="210" y1="100" x2="340" y2="100" stroke="#333" stroke-width="1.8"/>

  <!-- V(out) open terminal circle -->
  <circle cx="350" cy="100" r="9" fill="white" stroke="#333" stroke-width="1.8"/>

  <!-- V(out) label -->
  <text x="368" y="104" font-size="11" font-weight="bold" fill="#c00">V(out)</text>
</svg>
